    <style>
        html,
        body {
            background-color: #ffffff;
        }

        .ol-control>* {
            background-color: #f8f8f8 !important;
            color: #444444 !important;
            border-radius: 0px;
        }

        .ol-attribution a,
        .gcd-gl-input::placeholder,
        .search-layer-input-search::placeholder {
            color: #444444 !important;
        }

        .search-layer-input-search {
            background-color: #f8f8f8 !important;
        }

        .ol-control>*:focus,
        .ol-control>*:hover {
            background-color: rgba(248, 248, 248, 0.7) !important;
        }

        .ol-control {
            background-color: rgba(255, 255, 255, .4) !important;
            padding: 2px !important;
        }
    </style>

    <style>
        html,
        body,
        #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
    </style>
    <title>Alfabetización y Educación Formal</title>
    <style>
        /* Estilos del Modal de Bienvenida */
        #info-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            /* Asegura que esté por encima del mapa */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .modal-content {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin: 20px;
        }

        .modal-content h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 22px;
        }

        .modal-content p {
            color: #555555;
            line-height: 1.6;
            font-size: 15px;
            margin-bottom: 25px;
        }

        .btn-empezar {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-empezar:hover {
            background-color: #1c5980;
        }
    </style>
</head>

<body>
    <div id="info-modal">
        <div class="modal-content">
            <h2>Indicadores Educativos 2024</h2>
            <p>Bienvenido al visualizador espacial. Este mapa interactivo presenta la distribución territorial de los
                niveles de alfabetización y asistencia a educación formal en El Salvador, basándose en los resultados
                oficiales del Censo Nacional de Población y Vivienda 2024.</p>
            <button class="btn-empezar" onclick="cerrarModal()">Explorar Mapa</button>
        </div>
    </div>
    <div id="map">
        <div id="popup" class="ol-popup">
            <a href="#" id="popup-closer" class="ol-popup-closer"></a>
            <div id="popup-content"></div>
        </div>
    </div>
    <script>
            function cerrarModal() {
                document.getElementById('info-modal').style.display = 'none';
            }
        </script>
